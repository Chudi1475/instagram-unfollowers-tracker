<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div id="progress" class="progress hidden">
      <div class="progress-bar"></div>
      <div class="progress-text"></div>
    </div>

    <section class="view">
      <header class="brand">
        <div class="logo"></div>
        <h1>Chudi's Unfollow Checker</h1>
      </header>
      <p class="subtitle">Find who an Instagram account follows that doesn't follow them back.</p>
      <div class="search">
        <input type="text" id="search-input" placeholder="Enter Instagram username..." autocomplete="off" spellcheck="false" autofocus>
        <button id="search-btn">Check</button>
      </div>
      <p class="hint">Make sure you are logged into Instagram.</p>
      <div id="status"></div>
      <div id="results"></div>
    </section>

    <div id="toast" class="toast"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
